<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real Physics Archery</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#87ceeb, #ffffff);
}
canvas { display: block; }
#ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-family: Arial;
    font-size: 18px;
}
button {
    padding: 5px 10px;
    margin-top: 5px;
}
</style>
</head>
<body>

<div id="ui">
Score: <span id="score">0</span><br>
Wind: <span id="wind"></span><br>
<button onclick="toggleMode()">Toggle Day/Night</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gravity = 0.4;
let wind = (Math.random()*2-1)*0.2;
let arrow = null;
let charging = false;
let chargePower = 0;
let score = 0;
let night = false;

let bow = { x: 100, y: canvas.height - 150 };

let target = createTarget();

function createTarget(){
    return {
        x: canvas.width - 150,
        y: Math.random()*(canvas.height-300)+100,
        radius: 30,
        dy: (Math.random()-0.5)*2
    };
}

function drawBow(){
    ctx.strokeStyle="brown";
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.arc(bow.x, bow.y, 50, -Math.PI/2, Math.PI/2);
    ctx.stroke();
}

function drawArrow(a){
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(Math.atan2(a.vy, a.vx));
    ctx.fillStyle="black";
    ctx.fillRect(0,-2,40,4);
    ctx.restore();
}

function update(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawBow();

    // Target movement
    target.y += target.dy;
    if(target.y < 50 || target.y > canvas.height-50) target.dy *= -1;

    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(target.x,target.y,target.radius,0,Math.PI*2);
    ctx.fill();

    if(arrow){
        arrow.vy += gravity;
        arrow.vx += wind;
        arrow.x += arrow.vx;
        arrow.y += arrow.vy;

        drawArrow(arrow);

        // collision
        let dx = arrow.x - target.x;
        let dy = arrow.y - target.y;
        if(Math.sqrt(dx*dx+dy*dy) < target.radius){
            surprise();
            arrow=null;
            target=createTarget();
            wind = (Math.random()*2-1)*0.2;
        }

        if(arrow && arrow.y > canvas.height) arrow=null;
    }

    document.getElementById("wind").innerText =
        wind > 0 ? "→ " + wind.toFixed(2) : "← " + wind.toFixed(2);

    requestAnimationFrame(update);
}

function surprise(){
    let r = Math.random();
    if(r < 0.33){
        score += 10;
        alert("🎯 Perfect Shot +10");
    } else if(r < 0.66){
        score += 20;
        alert("🔥 Critical Hit +20");
    } else {
        score -= 5;
        alert("💨 Strong Wind Penalty -5");
    }
    document.getElementById("score").innerText = score;
}

canvas.addEventListener("mousedown", startCharge);
canvas.addEventListener("mouseup", shoot);
canvas.addEventListener("touchstart", startCharge);
canvas.addEventListener("touchend", shoot);

function startCharge(e){
    charging = true;
    chargePower = 0;
}

function shoot(e){
    if(!charging) return;
    charging = false;

    let rect = canvas.getBoundingClientRect();
    let mx = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX) - rect.left;
    let my = (e.changedTouches ? e.changedTouches[0].clientY : e.clientY) - rect.top;

    let dx = mx - bow.x;
    let dy = my - bow.y;

    let power = Math.min(15, Math.sqrt(dx*dx+dy*dy)/10);

    arrow = {
        x: bow.x,
        y: bow.y,
        vx: dx * 0.05 * power,
        vy: dy * 0.05 * power
    };
}

function toggleMode(){
    night = !night;
    if(night){
        document.body.style.background = "linear-gradient(#000022,#000000)";
    } else {
        document.body.style.background = "linear-gradient(#87ceeb,#ffffff)";
    }
}

update();
</script>

</body>
</html>
