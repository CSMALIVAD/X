<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gravity Sand Simulator</title>
<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}
canvas{display:block;}
#panel{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    font-size:14px;
}
button{
    margin:2px;
}
</style>
</head>
<body>

<div id="panel">
Gravity:
<button onclick="setGravity(0,1)">Down</button>
<button onclick="setGravity(0,-1)">Up</button>
<button onclick="setGravity(-1,0)">Left</button>
<button onclick="setGravity(1,0)">Right</button>
<br>
<button onclick="toggleSlow()">Slow Motion</button>
<button onclick="toggleBlackHole()">Black Hole</button>
<button onclick="increaseMass()">Increase Mass</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const size = 4;
const cols = Math.floor(canvas.width/size);
const rows = Math.floor(canvas.height/size);

let grid = [];
let gravity = {x:0, y:1};
let slow = false;
let blackHole = false;
let mass = 1;

for(let x=0;x<cols;x++){
    grid[x] = [];
    for(let y=0;y<rows;y++){
        grid[x][y] = 0;
    }
}

canvas.addEventListener("mousemove", e=>{
    if(e.buttons){
        let rect = canvas.getBoundingClientRect();
        let x = Math.floor((e.clientX - rect.left)/size);
        let y = Math.floor((e.clientY - rect.top)/size);
        for(let i=-2;i<=2;i++){
            for(let j=-2;j<=2;j++){
                if(x+i>=0 && x+i<cols && y+j>=0 && y+j<rows){
                    grid[x+i][y+j] = 1;
                }
            }
        }
    }
});

function setGravity(x,y){
    gravity.x = x;
    gravity.y = y;
}

function toggleSlow(){
    slow = !slow;
}

function toggleBlackHole(){
    blackHole = !blackHole;
}

function increaseMass(){
    mass += 0.2;
}

function update(){
    for(let x=0;x<cols;x++){
        for(let y=rows-1;y>=0;y--){
            if(grid[x][y] === 1){

                let nx = x + gravity.x;
                let ny = y + gravity.y;

                if(nx>=0 && nx<cols && ny>=0 && ny<rows){
                    if(grid[nx][ny] === 0){
                        grid[nx][ny] = 1;
                        grid[x][y] = 0;
                    }
                    else{
                        // slide left/right
                        let dir = Math.random() < 0.5 ? -1 : 1;
                        let sx = x + dir;
                        if(sx>=0 && sx<cols && grid[sx][y]===0){
                            grid[sx][y]=1;
                            grid[x][y]=0;
                        }
                    }
                }

                if(blackHole){
                    let cx = Math.floor(cols/2);
                    let cy = Math.floor(rows/2);
                    let dx = cx - x;
                    let dy = cy - y;
                    if(Math.abs(dx)+Math.abs(dy)<20){
                        grid[x][y]=0;
                    }
                }
            }
        }
    }
}

function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="gold";
    for(let x=0;x<cols;x++){
        for(let y=0;y<rows;y++){
            if(grid[x][y]===1){
                ctx.fillRect(x*size,y*size,size,size);
            }
        }
    }
}

function loop(){
    if(!slow){
        update();
    } else {
        if(Math.random()<0.3) update();
    }
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
